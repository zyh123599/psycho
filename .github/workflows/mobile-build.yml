name: Build mobile apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build web application
        run: npm run ionic:build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: xinchao-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  ios:
    name: iOS Simulator app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build web application
        run: npm run ionic:build

      - name: Generate iOS project
        run: npx cap add ios

      - name: Sync Capacitor plugins
        run: npx cap sync ios

      - name: Build iOS Simulator app
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Debug
          -sdk iphonesimulator
          -destination "generic/platform=iOS Simulator"
          -derivedDataPath ios/DerivedData
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Package iOS Simulator app
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          ios/DerivedData/Build/Products/Debug-iphonesimulator/App.app
          xinchao-ios-simulator.zip

      - name: Upload iOS Simulator app
        uses: actions/upload-artifact@v4
        with:
          name: xinchao-ios-simulator
          path: xinchao-ios-simulator.zip
          if-no-files-found: error
          retention-days: 14
